
{% extends "base.html" %}
{% block content %}

<link rel="icon" type="image/x-icon" href="/static/assets/favicon2.ico" />

<style>

/* ===== Background ===== */
.login-wrapper{
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

/* ===== Card ===== */
.login-card{
    background:white;
    width:100%;
    max-width:450px;
    padding:50px 40px;
    border-radius:20px;
    box-shadow:0 20px 50px rgba(0,0,0,0.15);
    text-align:center;
    animation:fadeUp 0.8s ease;
}

/* ===== Title ===== */
.login-card h1{
    font-size:1.8rem;
    font-weight:700;
    margin-bottom:30px;
    color:#0f172a;
}

/* ===== Button ===== */
.btn-corporate{
    background:#f59e0b;
    color:white;
    padding:12px;
    border-radius:30px;
    font-weight:600;
    transition:.3s;
    border:none;
}

.btn-corporate:hover{
    background:#d97706;
    transform:translateY(-3px);
}

/* ===== Animation ===== */
@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>

<div class="login-wrapper">

    <div class="login-card">
        <h1>السـلالم الدوليـة للاستقدام</h1>

        <a href="{{ url_for('login') }}"
           class="btn btn-corporate w-100">
           تسجيل الدخول
        </a>

    </div>

</div>

{% endblock %}
