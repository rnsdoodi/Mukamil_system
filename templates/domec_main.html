{% extends "simsoh_base.html" %}
{% block content %}

<link rel="icon" type="image/x-icon" href="/static/assets/favicon2.ico" />
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* ===== Background ===== */
.enterprise-wrapper{
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    font-family:'Tajawal', sans-serif;
}

/* ===== Card ===== */
.enterprise-card{
    background:white;
    width:100%;
    max-width:480px;
    padding:60px 40px;
    border-radius:18px;
    box-shadow:0 30px 70px rgba(0,0,0,0.18);
    text-align:center;
    animation:fadeUp .8s ease;
}

/* ===== Title ===== */
.enterprise-card h1{
    font-size:2rem;
    font-weight:700;
    color:#0f172a;
    margin-bottom:10px;
}

.enterprise-subtitle{
    font-size:0.95rem;
    color:#64748b;
    margin-bottom:35px;
}

/* ===== Button ===== */
.btn-enterprise{
    background:#f59e0b;
    color:white;
    padding:14px;
    border-radius:30px;
    font-weight:600;
    border:none;
    transition:.3s ease;
    letter-spacing:0.5px;
}

.btn-enterprise:hover{
    background:#d97706;
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

/* ===== Animation ===== */
@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>

<div class="enterprise-wrapper">

    <div class="enterprise-card">

        <h1>Princess Joy</h1>
        <a href="{{ url_for('domec_login') }}"
           class="btn btn-enterprise w-100">
           Login to the System
        </a>

    </div>

</div>

{% endblock %}
